name: Sanitization Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  sanitize-check:
    runs-on: ubuntu-latest
    name: Check for Sensitive Information
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Scan for Private IP Addresses
      run: |
        echo "🔍 Scanning for private IP addresses..."
        FOUND=0
        
        # Scan all text files (.md, .txt, .log, .c, .h, .yml)
        FILES=$(find . -type f \( -name "*.md" -o -name "*.txt" -o -name "*.log" -o -name "*.c" -o -name "*.h" -o -name "*.yml" \) -not -path "./build/*" -not -path "./.git/*" -not -path "./managed_components/*")
        
        for file in $FILES; do
          # Check for private IPv4 ranges
          if grep -E '192\.168\.[0-9]{1,3}\.[0-9]{1,3}' "$file" | grep -v '10\.0\.0\.' > /dev/null 2>&1; then
            echo "❌ Found private IP (192.168.x.x) in: $file"
            grep -n -E '192\.168\.[0-9]{1,3}\.[0-9]{1,3}' "$file" | grep -v '10\.0\.0\.'
            FOUND=1
          fi
          
          if grep -E '10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}' "$file" | grep -v -E '10\.0\.0\.(1|100)' > /dev/null 2>&1; then
            echo "❌ Found private IP (10.x.x.x) in: $file"
            grep -n -E '10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}' "$file" | grep -v -E '10\.0\.0\.(1|100)'
            FOUND=1
          fi
          
          if grep -E '172\.(1[6-9]|2[0-9]|3[0-1])\.[0-9]{1,3}\.[0-9]{1,3}' "$file" > /dev/null 2>&1; then
            echo "❌ Found private IP (172.16-31.x.x) in: $file"
            grep -n -E '172\.(1[6-9]|2[0-9]|3[0-1])\.[0-9]{1,3}\.[0-9]{1,3}' "$file"
            FOUND=1
          fi
        done
        
        if [ $FOUND -eq 1 ]; then
          echo ""
          echo "⚠️  Private IP addresses detected!"
          echo "ℹ️  Use sanitized IPs: 10.0.0.1 (gateway), 10.0.0.100 (host)"
          exit 1
        fi
        
        echo "✅ No private IP leaks detected"

    - name: Scan for Local File System Paths
      run: |
        echo "🔍 Scanning for local file system paths..."
        FOUND=0
        
        FILES=$(find . -type f \( -name "*.md" -o -name "*.txt" -o -name "*.log" \) -not -path "./build/*" -not -path "./.git/*")
        
        for file in $FILES; do
          # Check for common local paths (excluding env vars)
          if grep -E '/Users/[a-zA-Z0-9_-]+' "$file" | grep -v '${' | grep -v '\$ENV' > /dev/null 2>&1; then
            echo "❌ Found /Users/ path in: $file"
            grep -n -E '/Users/[a-zA-Z0-9_-]+' "$file" | grep -v '${' | grep -v '\$ENV'
            FOUND=1
          fi
          
          if grep -E '/home/[a-zA-Z0-9_-]+' "$file" | grep -v '${' | grep -v '\$ENV' > /dev/null 2>&1; then
            echo "❌ Found /home/ path in: $file"
            grep -n -E '/home/[a-zA-Z0-9_-]+' "$file" | grep -v '${' | grep -v '\$ENV'
            FOUND=1
          fi
          
          if grep -E 'C:\\\\Users\\\\[a-zA-Z0-9_-]+' "$file" > /dev/null 2>&1; then
            echo "❌ Found C:\\Users\\ path in: $file"
            grep -n -E 'C:\\\\Users\\\\[a-zA-Z0-9_-]+' "$file"
            FOUND=1
          fi
        done
        
        if [ $FOUND -eq 1 ]; then
          echo ""
          echo "⚠️  Local file system paths detected!"
          echo "ℹ️  Use environment variables: \${IDF_PATH}, \${PROJECT_DIR}"
          exit 1
        fi
        
        echo "✅ No local path leaks detected"

    - name: Scan for Sensitive SSIDs
      run: |
        echo "🔍 Scanning for sensitive WiFi SSIDs..."
        FOUND=0
        
        FILES=$(find . -type f \( -name "*.md" -o -name "*.txt" -o -name "*.log" -o -name "*.c" -o -name "*.h" \) -not -path "./build/*" -not -path "./.git/*" -not -path "./main/wifi_config.h.example")
        
        # List of allowed/sanitized SSIDs
        ALLOWED_SSIDS="GUITION_BETA_AP|GUEST_AP_X|YourWiFiSSID|YourSSID|FRITZ!Box 7530 WL"
        
        for file in $FILES; do
          # Check for SSID definitions that are not in allowed list
          if grep -E 'SSID.*"[^"]+"' "$file" | grep -v -E "($ALLOWED_SSIDS)" | grep -v "#define WIFI_SSID" > /dev/null 2>&1; then
            echo "⚠️  Potentially sensitive SSID in: $file"
            grep -n -E 'SSID.*"[^"]+"' "$file" | grep -v -E "($ALLOWED_SSIDS)" | grep -v "#define WIFI_SSID"
            echo "ℹ️  Review if SSID should be sanitized"
          fi
        done
        
        echo "✅ SSID scan complete"

    - name: Scan for Real MAC Addresses
      run: |
        echo "🔍 Scanning for potentially real MAC addresses..."
        FOUND=0
        
        FILES=$(find . -type f \( -name "*.md" -o -name "*.txt" -o -name "*.log" \) -not -path "./build/*" -not -path "./.git/*")
        
        # Sanitized MAC addresses are allowed
        ALLOWED_MACS="AA:BB:CC:00:00:01|AA:BB:CC:00:00:02"
        
        for file in $FILES; do
          # Check for MAC addresses not in allowed list
          if grep -Ei '([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}' "$file" | grep -v -E "($ALLOWED_MACS)" > /dev/null 2>&1; then
            echo "⚠️  Potentially real MAC address in: $file"
            grep -n -Ei '([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}' "$file" | grep -v -E "($ALLOWED_MACS)"
            echo "ℹ️  Use sanitized MACs: AA:BB:CC:00:00:01 (gateway), AA:BB:CC:00:00:02 (host)"
            FOUND=1
          fi
        done
        
        if [ $FOUND -eq 1 ]; then
          echo ""
          echo "⚠️  Real MAC addresses may be present!"
          exit 1
        fi
        
        echo "✅ No real MAC address leaks detected"

    - name: Summary
      if: success()
      run: |
        echo ""
        echo "✅ ========================================"
        echo "✅   All Sanitization Checks Passed!"
        echo "✅ ========================================"
        echo ""
        echo "No sensitive information detected:"
        echo "  ✓ Private IP addresses sanitized"
        echo "  ✓ Local file paths sanitized"
        echo "  ✓ WiFi SSIDs reviewed"
        echo "  ✓ MAC addresses sanitized"
        echo ""
        echo "Repository is ready for public release! 🎉"
